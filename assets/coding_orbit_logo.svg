<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Minimal coding orbit logo</title>
  <desc id="desc">A white minimalist atom-like coding company logo with three orbital paths and a central node.</desc>
  <rect width="512" height="512" fill="transparent"/>
  <g stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <!-- horizontal orbit -->
    <ellipse cx="256" cy="256" rx="180" ry="58" transform="rotate(0 256 256)"/>
    <!-- diagonal orbit -->
    <ellipse cx="256" cy="256" rx="180" ry="58" transform="rotate(60 256 256)"/>
    <!-- opposite diagonal orbit -->
    <ellipse cx="256" cy="256" rx="180" ry="58" transform="rotate(120 256 256)"/>
  </g>
  <circle cx="256" cy="256" r="30" fill="white"/>
  <!-- subtle code slash cut-ins to make it more coding-company specific -->
  <g stroke="white" stroke-width="18" stroke-linecap="round">
    <path d="M218 238L190 256L218 274"/>
    <path d="M294 238L322 256L294 274"/>
  </g>
</svg>
